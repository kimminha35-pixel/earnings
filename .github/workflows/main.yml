name: Hybrid Earnings Bot

on:
  schedule:
    - cron: '*/15 12-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # yfinance와 akshare 모두 설치
        run: pip install requests pandas yfinance akshare
        
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add earnings_state.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Update state [skip ci]" && git push)
